<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futbol Live - Canlı Maç Skorları</title>

<meta name="description" content="Futbol Live canlı maç skorları, Süper Lig ve futbol haberleri.">

<meta name="theme-color" content="#111111">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<!-- Uygulama dosyası -->
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="splash">

<img src="logo.png">

<h1>Futbol Live</h1>

</div>



<header>

<img src="logo.png" class="logo">

<span>Futbol Live</span>

</header>



<nav>

<a href="#">🔴 Canlı</a>

<a href="#">📅 Fikstür</a>

<a href="#">🏆 Puan</a>

<a href="#">📰 Haber</a>

</nav>



<div class="container">


<div class="card">

<h2>🔴 Canlı Maçlar</h2>


<button id="bildirimAc">
🔔 Bildirimleri Aç
</button>


<div id="liveMatches">

<div class="match">
<span>Canlı maçlar yükleniyor...</span>
</div>

</div>

</div>



<div class="card">

<h2>🏆 Süper Lig Puan Durumu</h2>


<table>

<thead>
<tr>
<th>#</th>
<th>Takım</th>
<th>P</th>
</tr>
</thead>


<tbody id="puan">

<tr>
<td colspan="3">Yükleniyor...</td>
</tr>

</tbody>

</table>

</div>



<div class="card">

<h2>📰 Son Haberler</h2>

<div class="news">
Futbol haberleri ve güncel gelişmeler yakında burada.
</div>

</div>


</div>



<footer>

Futbol Live © 2026

</footer>



<script src="script.js"></script>


<script>

setTimeout(()=>{

document.getElementById("splash").style.display="none";

},2000);



document.getElementById("bildirimAc").onclick=function(){

Notification.requestPermission().then(izin=>{

if(izin==="granted"){

new Notification("Futbol Live",{

body:"Bildirimler açıldı ⚽"

});

}

});

};


</script>


</body>
</html>
